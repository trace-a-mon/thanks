<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goodbye Gift OS</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        /* --- CORE STYLES --- */
        :root {
            --window-bg: #f8f9fa;
            --border-light: #ffffff;
            --border-dark: #6c5ce7;
            --title-bar: linear-gradient(90deg, #fd79a8, #e84393, #6c5ce7);
            --text-color: #2d3436;
            --taskbar-bg: linear-gradient(90deg, #00cec9, #0984e3, #6c5ce7);
            --icon-hover: rgba(255, 255, 255, 0.5);
        }

        body {
            margin: 0;
            padding: 0;
            background:
                radial-gradient(rgba(255, 255, 255, 0.4) 15%, transparent 16%),
                radial-gradient(rgba(255, 255, 255, 0.4) 15%, transparent 16%),
                linear-gradient(45deg, #ff9ff3, #feca57, #ff6b6b, #48dbfb, #1dd1a1, #5f27cd);
            background-size: 40px 40px, 40px 40px, 400% 400%;
            background-position: 0 0, 20px 20px, 0 0;
            animation: gradientBG 15s ease infinite;
            font-family: 'VT323', monospace;
            color: var(--text-color);
            overflow: hidden;
            height: 100vh;
            cursor: auto;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* --- DESKTOP ICONS --- */
        #desktop {
            position: absolute;
            top: 50px;
            left: 10px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 1;
        }

        .desktop-icon {
            width: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            cursor: pointer;
            padding: 5px;
            border: 1px dotted transparent;
        }

        .desktop-icon:hover {
            background-color: var(--icon-hover);
            border: 1px dotted var(--border-dark);
        }

        .icon-img {
            font-size: 2.5rem;
            margin-bottom: 5px;
            user-select: none;
        }

        .icon-text {
            font-size: 1.1rem;
            background-color: var(--window-bg);
            padding: 2px 4px;
            border: 1px solid var(--border-dark);
            user-select: none;
        }

        /* --- TOP BAR & MUSIC --- */
        #top-bar {
            width: 100%;
            height: 40px;
            background: var(--title-bar);
            border-bottom: 3px solid var(--border-dark);
            display: flex;
            align-items: center;
            padding: 0 15px;
            box-sizing: border-box;
            font-size: 1.2rem;
            z-index: 9999;
            position: absolute;
            top: 0;
            left: 0;
        }

        .music-controls {
            display: flex;
            gap: 10px;
            margin-right: 15px;
        }

        .btn {
            cursor: pointer;
            background-color: var(--window-bg);
            border: 2px solid var(--border-light);
            border-right-color: var(--border-dark);
            border-bottom-color: var(--border-dark);
            padding: 0 8px;
            line-height: 24px;
            user-select: none;
        }

        .btn:active {
            border-style: inset;
            background-color: #ffe4e1;
        }

        marquee {
            flex-grow: 1;
        }

        /* --- TASKBAR --- */
        #taskbar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 45px;
            background: var(--taskbar-bg);
            border-top: 3px solid var(--border-light);
            display: flex;
            align-items: center;
            padding: 0 5px;
            box-sizing: border-box;
            z-index: 9999;
            gap: 5px;
        }

        .start-btn {
            font-weight: bold;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 0 10px;
            height: 32px;
            cursor: pointer;
            background-color: var(--window-bg);
            border: 2px solid var(--border-light);
            border-right-color: var(--border-dark);
            border-bottom-color: var(--border-dark);
            user-select: none;
        }

        .start-btn:active {
            border-style: inset;
        }

        .taskbar-divider {
            width: 2px;
            height: 30px;
            background-color: var(--border-dark);
            border-right: 2px solid var(--border-light);
            margin: 0 5px;
        }

        .taskbar-app {
            font-size: 1.2rem;
            padding: 0 10px;
            height: 32px;
            display: none;
            align-items: center;
            cursor: pointer;
            background-color: var(--window-bg);
            border: 2px solid var(--border-light);
            border-right-color: var(--border-dark);
            border-bottom-color: var(--border-dark);
            min-width: 100px;
            user-select: none;
        }

        .taskbar-app.active {
            border-style: inset;
            background-color: #ffe4e1;
        }

        .taskbar-app.open {
            display: flex;
        }

        /* --- RESIZABLE WINDOW STYLES --- */
        .window {
            position: absolute;
            background-color: var(--window-bg);
            border: 3px solid var(--border-light);
            border-right-color: var(--border-dark);
            border-bottom-color: var(--border-dark);
            box-shadow: 4px 4px 0px rgba(0, 0, 0, 0.1);
            display: none;
            /* All windows hidden by default */
            flex-direction: column;
            resize: both;
            /* Makes the window adjustable */
            overflow: hidden;
            /* Required for resize to work cleanly */
            min-width: 250px;
            min-height: 200px;
        }

        .title-bar {
            background: var(--title-bar);
            padding: 5px 10px;
            font-size: 1.2rem;
            color: white;
            border-bottom: 2px solid var(--border-dark);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: grab;
            user-select: none;
        }

        .title-bar:active {
            cursor: grabbing;
        }

        .window-controls {
            display: flex;
            gap: 4px;
        }

        .win-btn {
            background-color: var(--window-bg);
            width: 20px;
            height: 20px;
            text-align: center;
            line-height: 16px;
            cursor: pointer;
            border: 2px solid var(--border-light);
            border-right-color: var(--border-dark);
            border-bottom-color: var(--border-dark);
            user-select: none;
        }

        .win-btn:active {
            border-style: inset;
        }

        .content {
            padding: 15px;
            flex-grow: 1;
            overflow-y: auto;
            font-size: 1.3rem;
            height: 100%;
        }

        /* Initial Window Positions */
        #quotes-window {
            top: 80px;
            left: 150px;
            width: 400px;
            height: 450px;
        }

        #photo-window {
            top: 120px;
            left: 200px;
            width: 450px;
            height: 350px;
        }

        #game-window {
            top: 60px;
            left: 250px;
            width: 500px;
            height: 400px;
        }

        .window.maximized {
            top: 40px !important;
            left: 0 !important;
            width: 100vw !important;
            height: calc(100vh - 85px) !important;
            resize: none;
        }

        /* --- QUOTE ENGINE --- */
        #quote-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 20px;
        }

        .shuffle-btn {
            width: 100%;
            padding: 10px;
            font-family: 'VT323';
            font-size: 1.4rem;
            cursor: pointer;
            background-color: var(--title-bar);
            border: 2px solid var(--border-light);
            border-right-color: var(--border-dark);
            border-bottom-color: var(--border-dark);
            margin-bottom: 15px;
        }

        .shuffle-btn:active {
            border-style: inset;
        }

        .quote-item {
            padding: 10px;
            background-color: rgba(255, 255, 255, 0.5);
            border: 1px dashed var(--border-dark);
        }

        /* --- PHOTO GALLERY --- */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
        }

        .thumbnail {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: #ddd;
            border: 2px solid var(--border-dark);
            cursor: pointer;
            object-fit: cover;
        }

        /* --- CAT MINIGAME --- */
        #game-area {
            position: relative;
            width: 100%;
            height: calc(100% - 40px);
            background-color: #ffe4e1;
            border: 2px inset var(--border-dark);
            overflow: hidden;
        }

        .game-hud {
            font-size: 1.5rem;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .game-cat {
            position: absolute;
            width: 50px;
            height: 50px;
            background-size: 400px 50px;
            animation: walk 1s steps(8) infinite;
            cursor: pointer;
        }

        .game-cat:active {
            opacity: 0.8;
        }

        .game-cat.purr {
            background-size: 200px 50px !important;
            animation: meow 0.5s steps(4) infinite;
        }

        @keyframes walk {
            from {
                background-position: 0px 0;
            }

            to {
                background-position: -400px 0;
            }
        }

        @keyframes meow {
            from {
                background-position: 0px 0;
            }

            to {
                background-position: -200px 0;
            }
        }

        /* --- IMAGE MODAL --- */
        #image-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 10000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        #modal-img {
            max-width: 80%;
            max-height: 80%;
            border: 4px solid var(--window-bg);
        }

        #close-modal {
            margin-top: 15px;
            font-family: 'VT323', monospace;
            font-size: 1.5rem;
            color: white;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div id="youtube-player" style="display: none;"></div>

    <div id="top-bar">
        <div class="music-controls">
            <div class="btn" id="play-btn">PLAY</div>
            <div class="btn" id="pause-btn">PAUSE</div>
            <div class="btn" id="next-btn">NEXT</div>
        </div>
        <marquee scrollamount="5" id="now-playing">Loading playlist metadata...</marquee>
    </div>

    <div id="desktop">
        <div class="desktop-icon" onclick="openWindow('quotes-window')">
            <div class="icon-img">📝</div>
            <div class="icon-text">Quotes.exe</div>
        </div>
        <div class="desktop-icon" onclick="openWindow('photo-window')">
            <div class="icon-img">🖼️</div>
            <div class="icon-text">Photos</div>
        </div>
        <div class="desktop-icon" onclick="openWindow('game-window')">
            <div class="icon-img">🐈</div>
            <div class="icon-text">Neko_Play</div>
        </div>
    </div>

    <div class="window" id="quotes-window" onmousedown="bringToFront(this)">
        <div class="title-bar" id="quotes-title">
            <span>Thoughts & Quotes.exe</span>
            <div class="window-controls">
                <div class="win-btn" onclick="minimizeWindow('quotes-window')">_</div>
                <div class="win-btn" onclick="toggleMaximize('quotes-window')">□</div>
                <div class="win-btn" onclick="closeWindow('quotes-window')">x</div>
            </div>
        </div>
        <div class="content">
            <button class="shuffle-btn" onclick="renderQuotes()">[ SHUFFLE MEMORIES ]</button>
            <div id="quote-container">
            </div>
        </div>
    </div>

    <div class="window" id="photo-window" onmousedown="bringToFront(this)">
        <div class="title-bar" id="photo-title">
            <span>Photo_Archive.exe</span>
            <div class="window-controls">
                <div class="win-btn" onclick="minimizeWindow('photo-window')">_</div>
                <div class="win-btn" onclick="toggleMaximize('photo-window')">□</div>
                <div class="win-btn" onclick="closeWindow('photo-window')">x</div>
            </div>
        </div>
        <div class="content">
            <div class="photo-grid">
                <img class="thumbnail" src="https://via.placeholder.com/150/ffb6c1/ffffff?text=Photo+1"
                    onclick="openModal(this.src)">
                <img class="thumbnail" src="https://via.placeholder.com/150/ffb6c1/ffffff?text=Photo+2"
                    onclick="openModal(this.src)">
                <img class="thumbnail" src="https://via.placeholder.com/150/ffb6c1/ffffff?text=Photo+3"
                    onclick="openModal(this.src)">
            </div>
        </div>
    </div>

    <div class="window" id="game-window" onmousedown="bringToFront(this)">
        <div class="title-bar" id="game-title">
            <span>Neko_Playground.exe</span>
            <div class="window-controls">
                <div class="win-btn" onclick="minimizeWindow('game-window')">_</div>
                <div class="win-btn" onclick="toggleMaximize('game-window')">□</div>
                <div class="win-btn" onclick="closeWindow('game-window')">x</div>
            </div>
        </div>
        <div class="content" style="display: flex; flex-direction: column; overflow: hidden;">
            <div class="game-hud">Cats Petted: <span id="score">0</span></div>
            <div id="game-area">
            </div>
        </div>
    </div>

    <div id="taskbar">
        <div class="start-btn">♥ START</div>
        <div class="taskbar-divider"></div>
        <div class="taskbar-app" id="task-quotes-window" onclick="toggleWindowFromTaskbar('quotes-window')">Quotes.exe
        </div>
        <div class="taskbar-app" id="task-photo-window" onclick="toggleWindowFromTaskbar('photo-window')">Photos</div>
        <div class="taskbar-app" id="task-game-window" onclick="toggleWindowFromTaskbar('game-window')">Neko_Play</div>
    </div>

    <div id="image-modal">
        <img id="modal-img" src="">
        <div id="close-modal" onclick="closeModal()">[ CLICK HERE TO CLOSE ]</div>
    </div>

    <script>
        let highestZIndex = 11;

        // --- 1. WINDOW DRAGGING ENGINE ---
        function makeDraggable(windowElement, titleBarElement) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            titleBarElement.onmousedown = dragMouseDown;

            function dragMouseDown(e) {
                e.preventDefault();
                pos3 = e.clientX; pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
                bringToFront(windowElement);
            }

            function elementDrag(e) {
                e.preventDefault();
                pos1 = pos3 - e.clientX; pos2 = pos4 - e.clientY;
                pos3 = e.clientX; pos4 = e.clientY;
                let newTop = windowElement.offsetTop - pos2;
                let newLeft = windowElement.offsetLeft - pos1;
                if (newTop < 40) newTop = 40;
                windowElement.style.top = newTop + "px";
                windowElement.style.left = newLeft + "px";
            }
            function closeDragElement() { document.onmouseup = null; document.onmousemove = null; }
        }

        makeDraggable(document.getElementById("quotes-window"), document.getElementById("quotes-title"));
        makeDraggable(document.getElementById("photo-window"), document.getElementById("photo-title"));
        makeDraggable(document.getElementById("game-window"), document.getElementById("game-title"));

        // --- 2. OS STATE MANAGEMENT ---
        function bringToFront(element) {
            highestZIndex++;
            element.style.zIndex = highestZIndex;
            document.querySelectorAll('.taskbar-app').forEach(btn => btn.classList.remove('active'));
            document.getElementById('task-' + element.id).classList.add('active');
        }

        function openWindow(windowId) {
            const win = document.getElementById(windowId);
            win.style.display = 'flex';
            document.getElementById('task-' + windowId).classList.add('open');
            bringToFront(win);

            if (windowId === 'quotes-window' && document.getElementById('quote-container').innerHTML.trim() === "") {
                renderQuotes(); // Render quotes first time it opens
            }
        }

        function closeWindow(windowId) {
            document.getElementById(windowId).style.display = 'none';
            document.getElementById('task-' + windowId).classList.remove('open', 'active');
        }

        function minimizeWindow(windowId) {
            document.getElementById(windowId).style.display = 'none';
            document.getElementById('task-' + windowId).classList.remove('active');
        }

        function toggleWindowFromTaskbar(windowId) {
            const win = document.getElementById(windowId);
            const taskBtn = document.getElementById('task-' + windowId);
            if (win.style.display === 'none') {
                win.style.display = 'flex';
                bringToFront(win);
            } else {
                if (taskBtn.classList.contains('active')) minimizeWindow(windowId);
                else bringToFront(win);
            }
        }

        function toggleMaximize(windowId) {
            const win = document.getElementById(windowId);
            win.classList.toggle('maximized');
            bringToFront(win);
        }

        // --- 3. DYNAMIC QUOTE ENGINE ---
        const quotes = [
            "Remember that epic game of Blood on the Clocktower?",
            "Like a wise mustachioed coach once said: Believe.",
            "A memory I'll always cherish is when we stayed up way too late.",
            "This OS was built just for you.",
            "Another beautiful memory placeholder goes right here."
        ];

        const alignments = ['left', 'center', 'right'];

        function renderQuotes() {
            const container = document.getElementById('quote-container');
            container.innerHTML = ''; // Clear current

            // Shuffle array
            const shuffled = [...quotes].sort(() => Math.random() - 0.5);

            shuffled.forEach(q => {
                let div = document.createElement('div');
                div.className = 'quote-item';
                div.innerText = q;

                // Randomize appearance
                div.style.textAlign = alignments[Math.floor(Math.random() * alignments.length)];
                let randomFontSize = (Math.random() * 0.4 + 1.1).toFixed(2); // Between 1.1rem and 1.5rem
                div.style.fontSize = randomFontSize + 'rem';

                // Randomize slight rotation for a scrapbook feel
                let randomRot = (Math.random() * 4 - 2).toFixed(1);
                div.style.transform = `rotate(${randomRot}deg)`;

                container.appendChild(div);
            });
        }

        // --- 4. CAT MINIGAME ENGINE ---
        const gameArea = document.getElementById('game-area');
        let score = 0;
        let cats = [];

        function initCatGame() {
            for (let i = 0; i < 5; i++) {
                createGameCat();
            }
            requestAnimationFrame(gameLoop);
        }

        function createGameCat() {
            let cat = document.createElement('div');
            cat.className = 'game-cat';

            let catType = Math.floor(Math.random() * 6) + 1; // 1 to 6
            cat.style.backgroundImage = `url('assets/Pet Cats Pack/Cat-${catType}/Cat-${catType}-Walk.png')`;

            // Physics properties
            let x = Math.random() * 300;
            let y = Math.random() * 200;
            let dx = (Math.random() - 0.5) * 4;
            let dy = (Math.random() - 0.5) * 4;

            cat.style.left = x + 'px';
            cat.style.top = y + 'px';

            cat.addEventListener('mousedown', function (e) {
                e.stopPropagation(); // Prevent window dragging
                score++;
                document.getElementById('score').innerText = score;
                cat.classList.add('purr');
                cat.style.backgroundImage = `url('assets/Pet Cats Pack/Cat-${catType}/Cat-${catType}-Meow.png')`;
                // Make them bounce away faster when petted
                dx = dx * 1.5; dy = dy * 1.5;
                setTimeout(() => {
                    cat.classList.remove('purr');
                    cat.style.backgroundImage = `url('assets/Pet Cats Pack/Cat-${catType}/Cat-${catType}-Walk.png')`;
                }, 500);
            });

            gameArea.appendChild(cat);
            cats.push({ el: cat, x: x, y: y, dx: dx, dy: dy });
        }

        function gameLoop() {
            let bounds = gameArea.getBoundingClientRect();

            cats.forEach(c => {
                c.x += c.dx;
                c.y += c.dy;

                // Bounce off walls (accounting for 50px width/height)
                if (c.x <= 0 || c.x >= bounds.width - 50) c.dx *= -1;
                if (c.y <= 0 || c.y >= bounds.height - 50) c.dy *= -1;

                // Enforce boundaries strictly in case resize traps them
                if (c.x < 0) c.x = 0;
                if (c.y < 0) c.y = 0;
                if (c.x > bounds.width - 50) c.x = bounds.width - 50;
                if (c.y > bounds.height - 50) c.y = bounds.height - 50;

                // Apply friction if moving too fast
                if (Math.abs(c.dx) > 2) c.dx *= 0.99;
                if (Math.abs(c.dy) > 2) c.dy *= 0.99;

                let flip = c.dx < 0 ? "scaleX(-1)" : "scaleX(1)";
                if (c.el.classList.contains('purr')) {
                    c.el.style.transform = flip + " scale(0.9)";
                } else {
                    c.el.style.transform = flip;
                }

                c.el.style.left = c.x + 'px';
                c.el.style.top = c.y + 'px';
            });

            requestAnimationFrame(gameLoop);
        }

        // Start game logic
        initCatGame();

        // --- 5. PHOTO & YOUTUBE LOGIC ---
        function openModal(src) { document.getElementById('modal-img').src = src; document.getElementById('image-modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('image-modal').style.display = 'none'; }

        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
        var player;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                height: '0', width: '0',
                playerVars: { 'listType': 'playlist', 'list': 'OLAK5uy_mUsEiA5KwoZvN4_J4cfShUINMEp8hv7GQ', 'loop': 1, 'controls': 0, 'autoplay': 0 },
                events: { 'onReady': onPlayerReady, 'onStateChange': onPlayerStateChange }
            });
        }
        function onPlayerReady(event) {
            document.getElementById('now-playing').innerText = "Playlist Loaded. Press PLAY to start...";
            document.getElementById('play-btn').addEventListener('click', () => player.playVideo());
            document.getElementById('pause-btn').addEventListener('click', () => player.pauseVideo());
            document.getElementById('next-btn').addEventListener('click', () => player.nextVideo());
        }
        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                var videoData = player.getVideoData();
                document.getElementById('now-playing').innerText = `▶ Now Playing: ${videoData.title || "Unknown Track"} by ${videoData.author || "Unknown Artist"}`;
            }
        }
    </script>
</body>

</html>
